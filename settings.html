<div class="textme-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>📱 TextMe v1.0</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- General -->
            <h4>General</h4>
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label">
                    <input id="textme_enabled" type="checkbox" />
                    <span>Enable Phone</span>
                </label>

                <label>Max Response Tokens</label>
                <input id="textme_max_tokens" type="number" min="50" max="2000" step="50" value="300" class="text_pole" />

                <label>Context Messages (from RP chat)</label>
                <input id="textme_context_messages" type="number" min="0" max="50" step="1" value="10" class="text_pole" />

                <label>Temperature</label>
                <div style="display:flex;align-items:center;gap:8px;">
                    <input id="textme_temperature" type="range" min="0" max="2" step="0.05" value="1.0" style="flex:1;" />
                    <span id="textme_temperature_value">1.00</span>
                </div>
            </div>

            <hr />

            <!-- Prompts -->
            <h4>Prompts</h4>
            <div class="flex-container flexFlowColumn">
                <label>SMS System Prompt</label>
                <textarea id="textme_sms_prompt" rows="8" class="text_pole"></textarea>
                <button id="textme_sms_prompt_reset" class="menu_button">Reset to default</button>

                <label>Selfie Prompt</label>
                <textarea id="textme_selfie_prompt" rows="6" class="text_pole"></textarea>
                <button id="textme_selfie_prompt_reset" class="menu_button">Reset to default</button>

                <label>Summary Prompt</label>
                <textarea id="textme_summary_prompt" rows="4" class="text_pole"></textarea>
                <button id="textme_summary_prompt_reset" class="menu_button">Reset to default</button>

                <label>Schedule Prompt</label>
                <textarea id="textme_schedule_prompt" rows="4" class="text_pole"></textarea>
                <button id="textme_schedule_prompt_reset" class="menu_button">Reset to default</button>

                <label>Autonomous Prompt</label>
                <textarea id="textme_autonomous_prompt" rows="4" class="text_pole"></textarea>
                <button id="textme_autonomous_prompt_reset" class="menu_button">Reset to default</button>
            </div>

            <hr />

            <!-- Selfie Generation -->
            <h4>Selfie Generation</h4>
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label">
                    <input id="textme_selfie_enabled" type="checkbox" />
                    <span>Enable Selfie</span>
                </label>

                <label>Trigger Mode</label>
                <select id="textme_selfie_trigger">
                    <option value="auto">Auto (model decides)</option>
                    <option value="manual">Manual (button)</option>
                    <option value="slash">Slash command (/selfie)</option>
                </select>

                <label>Image API Endpoint</label>
                <input id="textme_image_api_url" type="text" class="text_pole" placeholder="https://api.openai.com/v1/images/generations" />

                <label>Image API Key</label>
                <input id="textme_image_api_key" type="password" class="text_pole" placeholder="API key" />

                <label>Image Model</label>
                <input id="textme_image_model" type="text" class="text_pole" placeholder="e.g. dall-e-3" />

                <label>Reference Image (for consistency)</label>
                <input id="textme_reference_image" type="file" accept="image/*" />
                <div id="textme_reference_preview"></div>
            </div>

            <hr />

            <!-- Schedule & Status -->
            <h4>Schedule & Status</h4>
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label">
                    <input id="textme_schedule_enabled" type="checkbox" />
                    <span>Enable Schedule</span>
                </label>
                <button id="textme_generate_schedule" class="menu_button">
                    <i class="fa-solid fa-calendar-days"></i> Generate Schedule
                </button>
                <div id="textme_schedule_editor"></div>
            </div>

            <hr />

            <!-- Autonomous Messages -->
            <h4>Autonomous Messages</h4>
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label">
                    <input id="textme_autonomous_enabled" type="checkbox" />
                    <span>Enable Autonomous Messages</span>
                </label>

                <label>Inactivity Threshold (minutes)</label>
                <input id="textme_inactivity_threshold" type="number" min="1" max="60" step="1" value="5" class="text_pole" />

                <label>Max Follow-ups (without user reply)</label>
                <input id="textme_max_followups" type="number" min="1" max="10" step="1" value="3" class="text_pole" />

                <label class="checkbox_label">
                    <input id="textme_cooldown_escalation" type="checkbox" checked />
                    <span>Cooldown Escalation (×2 each follow-up)</span>
                </label>
            </div>

            <hr />

            <!-- Appearance -->
            <h4>Appearance</h4>
            <div class="flex-container flexFlowColumn">
                <label>Theme</label>
                <select id="textme_theme">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>

                <label>Color Scheme</label>
                <select id="textme_color_scheme">
                    <option value="default">Default (Purple)</option>
                    <option value="imessage">iMessage (Blue)</option>
                    <option value="whatsapp">WhatsApp (Green)</option>
                </select>

                <label>Phone Size</label>
                <select id="textme_phone_size">
                    <option value="normal">Normal (375×670)</option>
                    <option value="large">Large (420×750)</option>
                    <option value="fullscreen">Fullscreen</option>
                </select>

                <label>Phone Position</label>
                <select id="textme_phone_position">
                    <option value="right">Right</option>
                    <option value="center">Center</option>
                    <option value="left">Left</option>
                    <option value="floating">Floating</option>
                </select>

                <label class="checkbox_label">
                    <input id="textme_sound_effects" type="checkbox" checked />
                    <span>Sound Effects</span>
                </label>

                <label class="checkbox_label">
                    <input id="textme_show_timestamps" type="checkbox" checked />
                    <span>Show Timestamps</span>
                </label>
            </div>

            <hr />

            <!-- Debug -->
            <h4>Debug</h4>
            <div class="flex-container flexFlowColumn">
                <button id="textme_export_logs" class="menu_button">
                    <i class="fa-solid fa-file-export"></i> Export Logs
                </button>
            </div>

        </div>
    </div>
</div>
